# /etc/nginx/sites-available/eit-ipuniversity
#
# Reverse proxy to the Next.js app running under PM2 on port 3009.
# Your VPS already runs other apps (chatbot-api, erp-feedback-backend) on
# their own ports — this config only touches this app's server block and
# uses uniquely-named rate limit zones so it won't collide with theirs.
#
# After editing, enable it and reload Nginx:
#   sudo ln -s /etc/nginx/sites-available/eit-ipuniversity /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

limit_req_zone $binary_remote_addr zone=eit_ipuniversity_general:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=eit_ipuniversity_perip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Serve uploaded images directly from disk instead of proxying through
    # Node — faster, and keeps Node free for actual rendering work.
    location /uploads/ {
        alias /home/eit-ipuniversity/public/uploads/;
        expires 30d;
        access_log off;
    }

    location /_next/static/ {
        alias /home/eit-ipuniversity/.next/static/;
        expires 365d;
        access_log off;
    }

    location / {
        limit_req zone=eit_ipuniversity_general burst=20 nodelay;
        limit_conn eit_ipuniversity_perip 20;

        proxy_pass http://127.0.0.1:3009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 10M; # allow the 5MB image uploads plus headroom
}
